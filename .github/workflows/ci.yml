name: Machine Learning CI Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn numpy mlflow==2.19.0

      - name: Run MLflow Project
        run: |
          export MLFLOW_TRACKING_URI="sqlite:///mlflow.db"
          mlflow run MLProject --no-conda
          python MLProject/get_latest_run.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image from MLflow Model
        run: |
          export MLFLOW_TRACKING_URI="sqlite:///mlflow.db"
          mlflow models build-docker -m "runs:/${{ env.LATEST_RUN_ID }}/model" -n "titanic-mlflow-model:latest"

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker Image to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        run: |
          docker tag titanic-mlflow-model:latest "${{ secrets.DOCKERHUB_USERNAME }}/titanic-mlflow-model:latest"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/titanic-mlflow-model:latest"

      - name: Archive Model Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-artifacts
          path: mlruns/
