name: Machine Learning CI Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn numpy mlflow==2.19.0

    - name: Run MLflow Project
      env:
        # If DagsHub is integrated, we can pass DagsHub credentials to log runs online
        MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_PASSWORD }}
      run: |
        # Set tracking URI to local backend for building the docker image
        export MLFLOW_TRACKING_URI="sqlite:///mlflow.db"
        # Run MLflow project
        mlflow run MLProject --no-conda
        
        # Get the latest run ID from the local sqlite backend
        LATEST_RUN_ID=$(python -c "
import mlflow
mlflow.set_tracking_uri('sqlite:///mlflow.db')
client = mlflow.tracking.MlflowClient()
# MLProject defaults to experiment ID '0' or we search for latest run
runs = client.search_runs(experiment_ids=['0'], order_by=['attribute.start_time DESC'])
if runs:
    print(runs[0].info.run_id)
else:
    print('No run found')
        ")
        echo "LATEST_RUN_ID=$LATEST_RUN_ID" >> $GITHUB_ENV
        echo "Successfully completed MLProject run: $LATEST_RUN_ID"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image from MLflow Model
      run: |
        export MLFLOW_TRACKING_URI="sqlite:///mlflow.db"
        # Generate the Dockerfile and build context using mlflow models build-docker
        mlflow models build-docker -m "runs:/${{ env.LATEST_RUN_ID }}/model" -n "${{ secrets.DOCKERHUB_USERNAME }}/titanic-mlflow-model:latest"

    - name: Push Docker Image to Docker Hub
      run: |
        docker push "${{ secrets.DOCKERHUB_USERNAME }}/titanic-mlflow-model:latest"

    - name: Archive Model Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: trained-model-artifacts
        path: mlruns/
